<VirtualHost *:80>
    DocumentRoot /srv/app

    # Allow long-running barcode inventory processing (must exceed PHP set_time_limit of 600s)
    TimeOut 620

    <Directory "/srv/app">
        AllowOverride all
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
